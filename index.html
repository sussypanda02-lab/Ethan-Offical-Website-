<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Down!</title>
    <style>
        :root {
            --neon-yellow: #ccff00;
            --matrix-green: #00FF41;
            --neon-red: #ff003c;
            --win-grey: #c0c0c0;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #matrix-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }

        .main-frame {
            position: relative; z-index: 2;
            width: 550px; height: 320px;
            border: 5px solid var(--neon-yellow);
            border-radius: 20px;
            background: rgba(0, 0, 0, 0.95);
            box-shadow: 0 0 40px rgba(204, 255, 0, 0.6);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            text-align: center;
        }

        .android-head { width: 100px; fill: #3DDC84; margin-bottom: 25px; }
        .main-text { color: var(--neon-yellow); font-size: 1.5rem; font-weight: bold; text-transform: uppercase; }

        .login-trigger {
            position: fixed; top: 25px; right: 25px; z-index: 10;
            background: transparent; color: var(--neon-red);
            border: 2px solid var(--neon-red); padding: 10px 25px;
            cursor: pointer; font-weight: bold;
        }

        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); z-index: 100;
            display: none; justify-content: center; align-items: center;
        }

        .terminal-box {
            width: 480px; background: #000; border: 1px solid #555;
            padding: 40px; color: #fff;
        }

        .input-group input {
            width: 100%; background: transparent; border: 1px solid #444;
            color: var(--matrix-green); padding: 10px; margin-top: 5px;
        }

        .connect-btn {
            width: 100%; background: #e0e0e0; color: #000; border: none;
            padding: 12px; font-weight: bold; cursor: pointer; margin-top: 20px;
        }

        @keyframes vibrate {
            0% { transform: translate(0,0); }
            50% { transform: translate(-10px, 10px) rotate(-1deg); }
            100% { transform: translate(10px, -10px) rotate(1deg); }
        }
        .vibrate-active { animation: vibrate 0.05s infinite; background: #300 !important; border-color: #f00 !important; }

        .win98-popup {
            position: absolute; width: 420px; background: var(--win-grey);
            border: 2px solid; border-color: #fff #808080 #808080 #fff; z-index: 500;
            font-family: "Tahoma", sans-serif;
        }
        .win98-header { background: #000080; color: white; padding: 4px 6px; font-size: 14px; display: flex; justify-content: space-between; }
        .win98-body { padding: 25px; color: #000; font-size: 14px; font-weight: bold; }

        .blood-popup {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; background: #400; border: 5px solid #900; color: #ff0;
            padding: 40px; z-index: 2000; text-align: center; font-size: 2rem;
            box-shadow: 0 0 100px #f00; display: none;
        }

        #camera-container {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 400px; height: 300px; border: 4px solid #fff; background: #000;
            z-index: 1500; display: none; overflow: hidden;
        }
        #webcam { width: 100%; height: 100%; object-fit: cover; }

        #reboot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #fff; z-index: 1000; display: none;
            padding: 50px; font-size: 1.1rem; line-height: 1.4;
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <button class="login-trigger" onclick="openTerminal()">[ Login ]</button>

        <div class="main-text" id="header-text">THANK YOU FOR VISITING!<br>BUT THE WEBSITE IS DOWN!</div>
    </div>

    <div class="modal-overlay" id="terminal-modal">
        <div class="terminal-box">
            <div class="terminal-title">TERMINAL ACCESS</div>
            <div class="input-group"><label>Username:</label><input type="text" id="user-input"></div>
            <div class="input-group"><label>Password:</label><input type="password" id="pass-input"></div>
            <button class="connect-btn" onclick="startInfection()">CONNECT</button>

        </div>
    </div>

    <div id="reboot-screen"><div id="reboot-console"></div></div>

    <div id="camera-container"><video id="webcam" autoplay playsinline></video></div>
    <div id="blood-popup" class="blood-popup">I installed myself already!</div>

    <script>
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;
        let rainColor = "#0F0";
        let drops = Array(Math.floor(width/20)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = rainColor; ctx.font = "18px monospace";
            drops.forEach((y, i) => {
                const char = "0123456789".charAt(Math.floor(Math.random()*10));
                ctx.fillText(char, i*20, y*20);
                if(y*20 > height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 35);

        function openTerminal() { document.getElementById('terminal-modal').style.display = 'flex'; }

        function startInfection() {
            const u = document.getElementById('user-input').value;
            const p = document.getElementById('pass-input').value;
            if(u === "Admin" && p === "AdminKey2026") {
                const log = document.getElementById('infection-log');
                log.style.display = 'block';
                const fakeLines = [
                    ">> BREACHING KERNEL...",
                    ">> INJECTING PAYLOAD...",
                    ">> LOCATING USER GEODATA...",
                    ">> IP FOUND: 192.168.1.104",
                    ">> BYPASSING GOOGLE ENCRYPTION...",
                    ">> DOWNLOADING GALLERY.ZIP...",
                    ">> ACCESSING MICROPHONE...",
                    ">> SYNCING WITH EXTERNAL DRIVE...",
                    ">> ENCRYPTING LOCAL DISK (C:)...",
                    ">> YOU SHOULD HAVE STAYED AWAY."
                ];
                let i = 0;
                const logItv = setInterval(() => {
                    log.innerHTML += fakeLines[i] + "<br>";
                    i++;
                    if(i >= fakeLines.length) {
                        clearInterval(logItv);
                        setTimeout(triggerChaos, 1000);
                    }
                }, 400);
            }
        }

        function triggerChaos() {
            document.getElementById('terminal-modal').style.display = 'none';
            document.getElementById('center-box').classList.add('vibrate-active');
            document.getElementById('header-text').innerHTML = "~ha_ks  vis_ing!<br>£ut tle w3bsite i$ cfrren^ly dotn!";
            rainColor = "#f00";

            const errorMessages = [
                "A device attached to the system is not functioning.",
                "Illegal operation detected in 0x000FF1.",
                "Kernel memory leak: Fatal sector 0.",
                "User privacy settings: DISABLED.",
                "I am watching you through the glass.",
                "System corruption: 99% complete."
            ];

            for(let i=0; i<100; i++) {
                setTimeout(() => {
                    const p = document.createElement('div');
                    p.className = 'win98-popup';
                    p.style.left = Math.random()*70 + '%'; p.style.top = Math.random()*70 + '%';
                    const msg = errorMessages[Math.floor(Math.random()*errorMessages.length)];
                    p.innerHTML = `<div class="win98-header"><span>XMP.exe</span><span>X</span></div><div class="win98-body">${msg}</div>`;
                    document.body.appendChild(p);
                }, i * 35);
            }
            setTimeout(startReboot, 6000);
        }

        function startReboot() {
            document.querySelectorAll('.win98-popup').forEach(p => p.remove());
            document.getElementById('reboot-screen').style.display = 'block';
            let lines = [
                "Award Modular BIOS v4.51PG, An Energy Star Ally",
                "Copyright (C) 1984-2026, Award Software, Inc.",
                "PENTIUM-IV CPU at 3.0GHz",
                "Memory Test : 1048576K OK",
                "Detecting Primary Master ... Found",
                "------------------------------------",
                "WARNING: SYSTEM INTEGRITY COMPROMISED",
                "FILES DELETED: 14,321",
                "USER PROFILE: WIPED",
                "REBOOTING INTO VOID..."
            ];
            let i = 0;
            const itv = setInterval(() => {
                const l = document.createElement('div');
                l.innerHTML = lines[i];
                if(i > 5) l.style.color = "red";
                document.getElementById('reboot-console').appendChild(l);
                i++;
                if(i >= lines.length) {
                    clearInterval(itv);
                    setTimeout(askCamera, 1200);
                }
            }, 300);
        }

        async function askCamera() {
            document.getElementById('reboot-screen').style.display = 'none';
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('webcam');
                video.srcObject = stream;
                document.getElementById('camera-container').style.display = 'block';
            } catch (err) {
                document.getElementById('blood-popup').style.display = 'block';
                setTimeout(() => {
                    document.body.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%;'>GOODBYE.</h1>";
                }, 4000);
            }
        }
    </script>
</body>
</html>
