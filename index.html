<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Offline</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }

        #matrix {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

        .overlay {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .status-box {
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            /* Explicit Neon Yellow Border */
            border: 3px solid #faff00; 
            box-shadow: 0 0 20px #faff00, inset 0 0 10px #faff00;
            text-align: center;
            max-width: 600px;
            backdrop-filter: blur(10px);
        }

        h1 {
            /* Explicit Neon Yellow Text */
            color: #faff00;
            font-size: 2.2rem;
            margin: 0 0 15px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px #faff00;
        }

        p {
            /* Keep secondary text Yellow but slightly softer */
            color: #faff00;
            font-size: 1.2rem;
            margin: 0;
            opacity: 0.9;
            font-weight: bold;
        }

        .neon-line {
            height: 2px;
            background-color: #faff00;
            margin-top: 25px;
            box-shadow: 0 0 15px #faff00;
            animation: flicker 2s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>

    <div class="overlay">
        <div class="status-box">
            <h1>Thank you for visiting!</h1>
            <p>But the website is currently down!</p>
            <div class="neon-line"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');

        let width, height, columns;
        const fontSize = 16;
        const charList = "ｦｱｳｴｵｶｷｹｺｻｼｽｾｿﾀﾂﾃﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ2345789Z*+-<>|";
        let drops = [];

        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = [];
            for (let i = 0; i < columns; i++) {
                drops[i] = Math.random() * -100;
            }
        }

        function draw() {
            // Trail effect
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, width, height);

            // Matrix Neon Green Rain
            ctx.fillStyle = "#0f0"; // Bright Green
            ctx.font = fontSize + "px monospace";
            ctx.shadowBlur = 8;
            ctx.shadowColor = "#0f0";

            for (let i = 0; i < drops.length; i++) {
                const text = charList.charAt(Math.floor(Math.random() * charList.length));
                const x = i * fontSize;
                const y = drops[i] * fontSize;

                ctx.fillText(text, x, y);

                if (y > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
            // Reset shadow so it doesn't affect other elements if we added any
            ctx.shadowBlur = 0;
        }

        // Smoother animation loop
        function animate() {
            draw();
            setTimeout(() => {
                requestAnimationFrame(animate);
            }, 40); // Controls the speed of the rain
        }

        window.addEventListener('resize', resize);
        
        resize();
        animate();
    </script>
</body>
</html>
