<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Down!</title>
    <style>
        :root {
            --neon-yellow: #ccff00;
            --matrix-green: #00FF41; /* Classic Matrix Green */
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #000; /* Deep black for the matrix contrast */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* Matrix Canvas Layer */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Content Overlay */
        .container {
            position: relative;
            z-index: 2; /* Sits above the rain */
            text-align: center;
            padding: 3rem;
            border: 4px solid var(--neon-yellow);
            border-radius: 15px;
            background: rgba(0, 0, 0, 0.85); /* Slightly darker to pop from matrix */
            box-shadow: 0 0 30px rgba(204, 255, 0, 0.3), 
                        inset 0 0 20px rgba(0, 0, 0, 1);
            max-width: 85%;
            backdrop-filter: blur(5px); /* Softens the matrix rain behind the box */
        }

        .android-icon {
            width: 140px;
            height: 140px;
            fill: #3DDC84;
            margin-bottom: 20px;
            filter: grayscale(0.9) drop-shadow(0 0 10px rgba(61, 220, 132, 0.5));
            animation: flicker 4s infinite;
        }

        h1 {
            color: var(--neon-yellow);
            font-size: 2.2rem;
            text-transform: uppercase;
            margin: 0;
            text-shadow: 0 0 10px var(--neon-yellow), 
                         0 0 20px var(--neon-yellow);
            letter-spacing: 2px;
            line-height: 1.3;
        }

        p {
            margin-top: 20px;
            font-size: 1.1rem;
            color: #aaa;
            font-weight: bold;
            letter-spacing: 1px;
        }

        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.2; }
        }

        .glitch-border {
            animation: border-glow 3s infinite alternate;
        }

        @keyframes border-glow {
            from { box-shadow: 0 0 15px rgba(204, 255, 0, 0.3); }
            to { box-shadow: 0 0 40px rgba(204, 255, 0, 0.6); }
        }
    </style>
</head>
<body>

    <canvas id="matrix-canvas"></canvas>

    <div class="container glitch-border">
        <svg class="android-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.523 15.3414C17.0588 15.3414 16.6823 14.965 16.6823 14.5008C16.6823 14.0366 17.0588 13.6601 17.523 13.6601C17.9871 13.6601 18.3636 14.0366 18.3636 14.5008C18.3636 14.965 17.9871 15.3414 17.523 15.3414ZM6.47705 15.3414C6.01287 15.3414 5.6364 14.965 5.6364 14.5008C5.6364 14.0366 6.01287 13.6601 6.47705 13.6601C6.94123 13.6601 7.31771 14.0366 7.31771 14.5008C7.31771 14.965 6.94123 15.3414 6.47705 15.3414ZM17.9625 10.4357L19.7434 7.35121C19.8631 7.14389 19.792 6.87815 19.5847 6.75846C19.3773 6.63878 19.1116 6.70984 18.9919 6.91717L17.1852 10.0461C15.6596 9.35191 13.9238 8.96191 12 8.96191C10.0762 8.96191 8.34038 9.35191 6.81483 10.0461L5.00812 6.91717C4.88843 6.70984 4.62269 6.63878 4.41537 6.75846C4.20805 6.87815 4.13699 7.14389 4.25667 7.35121L6.03754 10.4357C3.12581 12.062 1.14442 15.0163 0.84082 18.4909H23.1592C22.8556 15.0163 20.8742 12.062 17.9625 10.4357Z"/>
            <line x1="6" y1="14" x2="7" y2="15" stroke="black" stroke-width="0.8"/>
            <line x1="7" y1="14" x2="6" y2="15" stroke="black" stroke-width="0.8"/>
            <line x1="17" y1="14" x2="18" y2="15" stroke="black" stroke-width="0.8"/>
            <line x1="18" y1="14" x2="17" y2="15" stroke="black" stroke-width="0.8"/>
        </svg>

        <h1>Thank you for visiting!<br>But the website is down!</h1>
        <p id="status-text">SYSTEM FAILURE: ERROR 503</p>
    </div>

    <script>
        /** MATRIX EFFECT LOGIC **/
        const canvas = document.getElementById('matrix-canvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Characters: Katakana + Latin + Numbers
        const characters = "ｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = width / fontSize;

        // Tracks the y-coordinate for each column
        const drops = [];
        for (let x = 0; x < columns; x++) {
            drops[x] = 1;
        }

        function drawMatrix() {
            // Semi-transparent black to create trailing effect
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, width, height);

            ctx.fillStyle = "#0F0"; // Green text
            ctx.font = fontSize + "px monospace";

            for (let i = 0; i < drops.length; i++) {
                const text = characters.charAt(Math.floor(Math.random() * characters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                // Reset drop to top randomly after it crosses the bottom
                if (drops[i] * fontSize > height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        // Resize handler
        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        setInterval(drawMatrix, 35);


        /** STATUS TEXT LOGIC **/
        const messages = [
            "SYSTEM FAILURE: ERROR 503",
            "REBOOTING SERVERS...",
            "DATA CORRUPTION DETECTED",
            "SEARCHING FOR BACKUP...",
            "THE SYSTEM IS OFFLINE"
        ];
        
        let index = 0;
        const statusElement = document.getElementById('status-text');

        setInterval(() => {
            index = (index + 1) % messages.length;
            statusElement.style.opacity = 0;
            setTimeout(() => {
                statusElement.textContent = messages[index];
                statusElement.style.opacity = 1;
            }, 500);
        }, 4000);

        statusElement.style.transition = "opacity 0.5s ease";
    </script>
</body>
</html>
